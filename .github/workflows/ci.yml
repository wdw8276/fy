name: CI

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show version
        run: |
          echo "version: $(grep '^version' Cargo.toml | head -1 | awk '{print $3}' | tr -d '"')"

      - name: Show target platform
        run: |
          echo "target: $(rustc -vV | grep '^host:' | awk '{print $2}')"

      - name: Run unit tests
        run: cargo test -- --nocapture

      - name: Build release
        run: |
          cargo build --release
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TARGET=$(rustc -vV | grep host | sed 's/.*: //')
          echo "Building fy ${VERSION} for ${TARGET}"
          mkdir -p build
          BIN="build/fy-${VERSION}-${TARGET}"
          cp target/release/fy "${BIN}"
          ln -sf "fy-${VERSION}-${TARGET}" build/fy
          echo "BIN=${BIN}" >> $GITHUB_ENV
          echo "Binary: ${BIN}"

      - name: Run integration tests
        run: make check

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BIN }}
